{% extends "layout.html" %}
{% block content %}
<div style="padding: 20px; max-width: 900px; margin: auto;">
    <div style="background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden;">
        
        <div style="padding: 20px; background: #f8f9fa; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin: 0; color: #333;"><i class="fas fa-tasks"></i> Concluir Revisão</h3>
            {% if lote %}
                <span style="background: {% if lote.status_revisao == 'Pendente' %}#fff3cd{% else %}#d1e7dd{% endif %}; 
                             color: {% if lote.status_revisao == 'Pendente' %}#856404{% else %}#0f5132{% endif %}; 
                             padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; border: 1px solid;">
                    STATUS: {{ lote.status_revisao | upper }}
                </span>
            {% endif %}
        </div>

        <div style="padding: 30px;">
            <form action="{{ url_for('concluir_revisao_busca') }}" method="GET" style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; margin-bottom: 30px;">
                <div>
                    <label style="font-size: 0.75rem; font-weight: bold; color: #666;">PROGRAMA / DOC</label>
                    <input type="text" name="doc" value="{{ doc_buscado or '' }}" class="form-control" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
                </div>
                <div>
                    <label style="font-size: 0.75rem; font-weight: bold; color: #666;">Nº DO CALÇADO</label>
                    <input type="text" name="num" value="{{ num_buscado or '' }}" class="form-control" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
                </div>
                <button type="submit" style="align-self: flex-end; padding: 10px 20px; background: #5c67f2; color: white; border: none; border-radius: 5px; cursor: pointer;">
                    <i class="fas fa-search"></i>
                </button>
            </form>

            {% if lote %}
            <hr>
            <form action="{{ url_for('finalizar_revisao_db', id=lote.id) }}" method="POST">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                    
                    <div>
                        <label style="font-weight: bold;">Data da Revisão:</label>
                        <input type="date" name="data_revisao" value="{{ data_hoje }}" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
                    </div>

                    <div>
                        <label style="font-weight: bold;">Lote Abastecido?</label>
                        <select name="status_abastecido" id="status_abastecido" onchange="ajustarObrigatoriedade()" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
                            <option value="NAO">NÃO (FICOU P/ REVISÃO)</option>
                            <option value="SIM">SIM (ABASTECIDO)</option>
                        </select>
                    </div>

                    <div>
                        <label style="font-weight: bold;">Quem Revisou?</label>
                        <input type="text" name="quem_revisou" id="quem_revisou" required style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
                    </div>

                    <div>
                        <label style="font-weight: bold;">Qtd de Problemas:</label>
                        <input type="number" name="qtd_problemas" id="qtd_problemas" value="0" required style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
                    </div>
                </div>

                <div style="margin-top: 30px; display: flex; gap: 10px;">
                    <button type="submit" style="flex: 2; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                        CONCLUIR REVISÃO
                    </button>
                    <a href="{{ url_for('dashboard_interno') }}" style="flex: 1; padding: 15px; background: #f1f2f6; color: #333; text-decoration: none; text-align: center; border-radius: 8px; font-weight: bold;">
                        CANCELAR
                    </a>
                </div>
            </form>
            {% endif %}
        </div>
    </div>
</div>

<script>
function ajustarObrigatoriedade() {
    const isAbastecido = document.getElementById('status_abastecido').value === 'SIM';
    const quem = document.getElementById('quem_revisou');
    const qtd = document.getElementById('qtd_problemas');

    if (isAbastecido) {
        // Se abastecido, não é obrigatório preencher
        quem.required = false;
        qtd.required = false;
        quem.placeholder = "Opcional p/ abastecido";
    } else {
        quem.required = true;
        qtd.required = true;
        quem.placeholder = "";
    }
}
</script>
{% endblock %}
